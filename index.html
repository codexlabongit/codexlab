<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodexLab - Showcase</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <h1>CodexLab</h1>
  <p>Vos projets numériques présentés avec style et interactivité</p>
</header>

<section id="projets">
  <h2>Mes Projets</h2>
  <div class="grid">
    <div class="projet" 
         onclick="openProject(this)" 
         data-title="Alpha" 
         data-price="49€" 
         data-desc="Principe : Générateur avancé de mots de passe.\n- Sécurisation optimale\n- Analyse statistique intégrée\n- Comparatif historique des performances\n- Aussi sur commande"
         data-chart='[20,50,80,60,40]' 
         data-commands="3 commandes">
      <div class="placeholder">Projet Alpha</div>
    </div>
    <div class="projet" 
         onclick="openProject(this)" 
         data-title="Beta" 
         data-price="29€" 
         data-desc="Principe : Analyseur statistique de mots de passe.\n- Evaluation des risques\n- Génération de rapports\n- Graphiques dynamiques\n- Aussi sur commande"
         data-chart='[10,30,60,80,50]' 
         data-commands="5 commandes">
      <div class="placeholder">Projet Beta</div>
    </div>
  </div>
</section>

<!-- Modal Projet -->
<div id="projectModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeProject()">&times;</span>
    <div class="modal-header">
      <h2 id="modalTitle">Titre Projet</h2>
      <span id="modalPrice">0€</span>
    </div>
    <div class="modal-body">
      <div class="modal-desc">
        <h3>Principe / Description</h3>
        <p id="modalDesc"></p>
      </div>
      <div class="modal-stats">
        <canvas id="statsChart" width="200" height="150"></canvas>
        <p id="modalCommands"></p>
      </div>
    </div>
    <div class="modal-footer">
      <a href="mailto:contactcodexlab@proton.me" class="contact-btn">📧 Envoyer un message</a>
    </div>
  </div>
</div>

<script>
// Ouvrir projet avec dispersion
function openProject(el){
  const modal = document.getElementById('projectModal');
  document.getElementById('modalTitle').textContent = el.dataset.title;
  document.getElementById('modalPrice').textContent = el.dataset.price;
  
  // Remplacer \n par <br> pour multi-lignes
  document.getElementById('modalDesc').innerHTML = el.dataset.desc.replace(/\n/g,'<br>');  
  document.getElementById('modalCommands').textContent = el.dataset.commands;

  createPaintballEffect(el);

  // Remplir graphique
  const data = JSON.parse(el.dataset.chart);
  const ctx = document.getElementById('statsChart').getContext('2d');
  if(window.myChart) window.myChart.destroy();
  window.myChart = new Chart(ctx,{
    type:'line',
    data:{
      labels:data.map((v,i)=>i+1),
      datasets:[{
        label:'Probabilité (%)',
        data:data,
        borderColor:'#74ebd5',
        backgroundColor:'rgba(116,235,213,0.3)',
        fill:true,
        tension:0.3
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,max:100}}
    }
  });

  modal.classList.add('active');

  // Animation fade-in pour contenu
  const content = modal.querySelector('.modal-content');
  content.style.opacity=0;
  setTimeout(()=>{content.style.opacity=1;},50);
}

// Fermer modal
function closeProject(){
  const modal = document.getElementById('projectModal');
  modal.classList.remove('active');
}

// Dispersion style paintball
function createPaintballEffect(el){
  const count = 40;
  const body = document.body;
  for(let i=0;i<count;i++){
    const dot = document.createElement('div');
    dot.className='paintball';
    dot.style.left = el.offsetLeft + el.offsetWidth/2 + 'px';
    dot.style.top = el.offsetTop + el.offsetHeight/2 + 'px';
    const x = (Math.random()-0.5)*400;
    const y = (Math.random()-0.5)*400;
    dot.style.transform = `translate(${x}px,${y}px)`;
    body.appendChild(dot);
    setTimeout(()=>dot.remove(),900);
  }
}
</script>
</body>
</html>
